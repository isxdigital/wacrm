services:
  wacrm:
    image: ghcr.io/isxdigital/wacrm:latest
    ports:
      - target: 3000
        published: 3001
        protocol: tcp
        mode: ingress
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      META_APP_SECRET: ${META_APP_SECRET}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
      ALLOWED_INVITE_HOSTS: ${ALLOWED_INVITE_HOSTS:-}
      AUTOMATION_CRON_SECRET: ${AUTOMATION_CRON_SECRET}
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wacrm-cron:
    image: alpine/curl:latest
    environment:
      AUTOMATION_CRON_SECRET: ${AUTOMATION_CRON_SECRET}
    command: >
      sh -c 'while true; do
        curl -fsS -H "x-cron-secret: $$AUTOMATION_CRON_SECRET" http://wacrm:3000/api/automations/cron || true;
        curl -fsS -H "x-cron-secret: $$AUTOMATION_CRON_SECRET" http://wacrm:3000/api/flows/cron || true;
        sleep 300;
      done'
    deploy:
      replicas: 1
      restart_policy:
        condition: any
